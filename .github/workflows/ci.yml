name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      CRON_SECRET: test-cron-secret-32chars-long-value!!
      COLLECTION_SECRET: test-collection-secret-32chars!!!
      QWEN_API_KEY: test-qwen-key
      QWEN_BASE_URL: https://llm.example.com/v1
      QWEN_MODEL: qwen-turbo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_CENTER_EMAIL: ${{ secrets.TEST_CENTER_EMAIL }}
      TEST_CENTER_PASSWORD: ${{ secrets.TEST_CENTER_PASSWORD }}
      TEST_AGENCY_EMAIL: ${{ secrets.TEST_AGENCY_EMAIL }}
      TEST_AGENCY_PASSWORD: ${{ secrets.TEST_AGENCY_PASSWORD }}
      COLLECTION_SECRET: test-collection-secret-32chars!!!
      CRON_SECRET: test-cron-secret-32chars-long-value!!
      QWEN_API_KEY: test-qwen-key
      QWEN_BASE_URL: https://llm.example.com/v1
      QWEN_MODEL: qwen-turbo

    steps:
      - name: Check required secrets
        id: check
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  NEXT_PUBLIC_SUPABASE_URL secret이 없습니다. E2E 테스트를 건너뜁니다."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.check.outputs.skip != 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: failure() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
