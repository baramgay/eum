name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:
    secrets:
      NEXT_PUBLIC_SUPABASE_URL: { required: false }
      NEXT_PUBLIC_SUPABASE_ANON_KEY: { required: false }
      NEXT_PUBLIC_KAKAO_MAP_KEY: { required: false }
      COLLECTION_SECRET: { required: false }
      SUPABASE_SERVICE_ROLE_KEY: { required: false }
      QWEN_API_KEY: { required: false }
      QWEN_BASE_URL: { required: false }
      QWEN_MODEL: { required: false }

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --passWithNoTests
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KAKAO_MAP_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_KEY }}
          COLLECTION_SECRET: ${{ secrets.COLLECTION_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          NEXT_PUBLIC_APP_URL: https://eum-na-da-s-projects.vercel.app
