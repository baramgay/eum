name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      CRON_SECRET: test-cron-secret-32chars-long-value!!
      COLLECTION_SECRET: test-collection-secret-32chars!!!
      QWEN_API_KEY: test-qwen-key
      QWEN_BASE_URL: https://llm.example.com/v1
      QWEN_MODEL: qwen-turbo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_CENTER_EMAIL: ${{ secrets.TEST_CENTER_EMAIL }}
      TEST_CENTER_PASSWORD: ${{ secrets.TEST_CENTER_PASSWORD }}
      TEST_AGENCY_EMAIL: ${{ secrets.TEST_AGENCY_EMAIL }}
      TEST_AGENCY_PASSWORD: ${{ secrets.TEST_AGENCY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          npm run dev > /tmp/dev.log 2>&1 &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || true)
            if [ "$code" = "200" ] || [ "$code" = "503" ]; then
              echo "dev server is up (health: $code)"
              break
            fi
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
