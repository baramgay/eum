# 이음(EUM) 온톨로지 스키마 설정
# 이 파일만 수정해 타 지역(시군 코드, 시설 유형, 가중치)을 적용할 수 있다.
# app/ontology.py가 서버 시작 시 한 번 로드한다.

# 공공시설 필터 (gold_public_facility.ftype 값)
facility_filter: "청년센터"

# 액션 정의 — 각 항목은 ontology.py의 _score_action()이 읽는다.
# weights 합계가 1.0이어야 한다.
actions:
  settlement:
    name: "청년 정착지원 우선지역 선정"
    description: "청년규모·산업기반·인프라부족·순유출 종합 스코어링"
    weights:
      youth_pop:    0.30   # 청년인구 규모
      employees:    0.20   # 고용 기반
      facility_gap: 0.25   # 청년인프라 부족 (클수록 우선)
      outmigration: 0.25   # 순유출 규모 (클수록 우선)

  housing:
    name: "청년 주거지원 우선지역 선정"
    description: "청년인프라 부족과 순유출이 심한 지역을 주거지원 우선 대상으로 선정"
    weights:
      youth_pop:    0.20
      employees:    0.00
      facility_gap: 0.40   # 주거·생활 인프라 부족 비중 높임
      outmigration: 0.40   # 청년 이탈 비중 높임

  employment:
    name: "청년 취업지원 우선지역 선정"
    description: "청년인구 규모 대비 고용 기반이 취약한 지역을 취업지원 우선 대상으로 선정"
    weights:
      youth_pop:    0.35   # 지원 대상 규모
      employees:    0.40   # 고용 기반 부족 (역수 적용)
      facility_gap: 0.25
      outmigration: 0.00

